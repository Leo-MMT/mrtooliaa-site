<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#1f2937;-webkit-font-smoothing:antialiased}
body{padding:20px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.tok{border:1px solid #e5e7eb;border-radius:12px;padding:10px 12px;display:flex;gap:10px;align-items:center;background:#fff}
.dot{width:22px;height:22px;border-radius:8px}
.k{font-size:12px;font-weight:700;color:#0d1a2d}
.h{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11px;color:#6b7280}
.group{margin-bottom:10px}
.lbl{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#6b7280;margin-bottom:6px}
</style></head>
<body>
<div class="group"><div class="lbl">Status</div><div class="row">
  <div class="tok"><div class="dot" style="background:#16a34a"></div><div><div class="k">success</div><div class="h">#16a34a</div></div></div>
  <div class="tok"><div class="dot" style="background:#dcfce7;border:1px solid #bbf7d0"></div><div><div class="k">success-bg</div><div class="h">#dcfce7</div></div></div>
  <div class="tok"><div class="dot" style="background:#f59e0b"></div><div><div class="k">warn</div><div class="h">#f59e0b</div></div></div>
  <div class="tok"><div class="dot" style="background:#dc2626"></div><div><div class="k">danger</div><div class="h">#dc2626</div></div></div>
  <div class="tok"><div class="dot" style="background:#fee2e2;border:1px solid #fecaca"></div><div><div class="k">danger-bg</div><div class="h">#fee2e2</div></div></div>
</div></div>
<div class="group"><div class="lbl">Foreground (on light)</div><div class="row">
  <div class="tok"><div class="dot" style="background:#0d1a2d"></div><div><div class="k">fg-1</div><div class="h">headings</div></div></div>
  <div class="tok"><div class="dot" style="background:#1f2937"></div><div><div class="k">fg-2</div><div class="h">body</div></div></div>
  <div class="tok"><div class="dot" style="background:#4b5563"></div><div><div class="k">fg-3</div><div class="h">secondary</div></div></div>
  <div class="tok"><div class="dot" style="background:#9ca3af"></div><div><div class="k">fg-4</div><div class="h">muted</div></div></div>
</div></div>
</body></html>
