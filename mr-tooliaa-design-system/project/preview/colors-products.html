<!doctype html><html><head><meta charset="utf-8"><title>Product colors</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#1f2937;-webkit-font-smoothing:antialiased}
body{padding:20px}
.grp{margin-bottom:14px}
.lbl{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#6b7280;margin-bottom:6px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:104px;height:96px;border-radius:14px;padding:10px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.hex{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11px;font-weight:600}
</style></head>
<body>
<div class="grp">
  <div class="lbl">MediTurno — Medical blue</div>
  <div class="row">
    <div class="sw" style="background:#003d7a;color:#fff"><span class="name">Deep</span><span class="hex">#003d7a</span></div>
    <div class="sw" style="background:#0066CC;color:#fff"><span class="name">500</span><span class="hex">#0066CC</span></div>
    <div class="sw" style="background:#0088ff;color:#fff"><span class="name">Bright</span><span class="hex">#0088ff</span></div>
    <div class="sw" style="background:#cce5ff;color:#003d7a"><span class="name">100</span><span class="hex">#cce5ff</span></div>
  </div>
</div>
<div class="grp">
  <div class="lbl">Ferret-Quote — Industrial</div>
  <div class="row">
    <div class="sw" style="background:#1f2937;color:#fff"><span class="name">Gray</span><span class="hex">#1f2937</span></div>
    <div class="sw" style="background:#374151;color:#fff"><span class="name">Gray-2</span><span class="hex">#374151</span></div>
    <div class="sw" style="background:#78350f;color:#fff"><span class="name">Hardware</span><span class="hex">#78350f</span></div>
    <div class="sw" style="background:repeating-linear-gradient(-45deg,#f97316,#f97316 8px,#ea6c0a 8px,#ea6c0a 16px);color:#fff"><span class="name">Hazard</span><span class="hex">stripe</span></div>
  </div>
</div>
</body></html>
