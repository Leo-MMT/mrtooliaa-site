<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#0d1a2d;-webkit-font-smoothing:antialiased}
body{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col{background:#f8fafc;border-radius:14px;padding:14px}
.t{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#6b7280;margin-bottom:10px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sq{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.svg{background:#fff;border:1px solid #e5e7eb;color:#1e3a5f}
.emo-a{background:#fef2f2}.emo-b{background:#dbeafe}.emo-c{background:#ffedd5}.emo-d{background:#dcfce7}.emo-e{background:#ede9fe}
</style></head>
<body>
<div class="col"><div class="t">Lucide SVG (in cards)</div><div class="row">
  <div class="sq svg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg></div>
  <div class="sq svg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
  <div class="sq svg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
  <div class="sq svg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
  <div class="sq svg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
</div></div>
<div class="col"><div class="t">Emoji (decorative)</div><div class="row">
  <div class="sq emo-a">⏰</div>
  <div class="sq emo-b">💬</div>
  <div class="sq emo-c">⚙️</div>
  <div class="sq emo-d">🚀</div>
  <div class="sq emo-e">🤖</div>
  <div class="sq emo-b">📱</div>
  <div class="sq emo-c">⚡</div>
  <div class="sq emo-d">🇩🇴</div>
</div></div>
</body></html>
