<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente metálico premium -->
    <linearGradient id="mainMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#475569;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>

    <!-- Gradiente teal brillante para circuitos -->
    <linearGradient id="circuitGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.4" />
    </linearGradient>

    <!-- Filtro de resplandor -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Filtro de sombra suave -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fondo oscuro tecnológico -->
  <rect width="800" height="800" fill="#020617" />

  <!-- Subtítulo decorativo - circuito fino de fondo -->
  <g opacity="0.15">
    <line x1="50" y1="100" x2="750" y2="100" stroke="#22d3ee" stroke-width="1"/>
    <line x1="50" y1="700" x2="750" y2="700" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="50" cy="100" r="4" fill="#22d3ee"/>
    <circle cx="750" cy="100" r="4" fill="#22d3ee"/>
    <circle cx="50" cy="700" r="4" fill="#22d3ee"/>
    <circle cx="750" cy="700" r="4" fill="#22d3ee"/>
  </g>

  <!-- Estructura Unificada MR con sombra -->
  <g filter="url(#softShadow)">
    <!-- Cuerpo principal de las letras M y R -->
    <path d="M150 620 V180 L330 450 L510 180 V620 M510 380 H640 C700 380 720 430 720 480 C720 530 700 580 640 580 H510 M580 480 L720 620"
      fill="none"
      stroke="url(#mainMetal)"
      stroke-width="55"
      stroke-linejoin="round"
      stroke-linecap="round" />
  </g>

  <!-- Capa de Circuitos IA y Conexiones - M -->
  <g filter="url(#glow)" opacity="0.7">
    <!-- Líneas de circuito principales M -->
    <path d="M180 260 V560 M215 295 V525 M250 330 V490"
      stroke="url(#circuitGlow)"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round" />

    <!-- Conexiones diagonales M -->
    <path d="M330 430 L465 230 M330 385 L420 230"
      stroke="url(#circuitGlow)"
      stroke-width="2"
      fill="none"
      stroke-linecap="round" />

    <!-- Puntos de circuito M -->
    <circle cx="330" cy="430" r="7" fill="#22d3ee"/>
    <circle cx="150" cy="180" r="5" fill="#22d3ee"/>
    <circle cx="510" cy="180" r="5" fill="#22d3ee"/>
    <circle cx="180" cy="260" r="3" fill="#22d3ee"/>
    <circle cx="215" cy="295" r="3" fill="#22d3ee"/>
    <circle cx="250" cy="330" r="3" fill="#22d3ee"/>
  </g>

  <!-- Capa de Circuitos IA y Conexiones - R -->
  <g filter="url(#glow)" opacity="0.7">
    <!-- Líneas de circuito horizontales R -->
    <path d="M545 395 H625 M545 430 H605 M545 465 H585"
      stroke="url(#circuitGlow)"
      stroke-width="2.5"
      fill="none"
      stroke-linecap="round" />

    <!-- Conexiones curvas R -->
    <path d="M605 555 L685 655 M635 555 L715 655"
      stroke="url(#circuitGlow)"
      stroke-width="2"
      fill="none"
      stroke-linecap="round" />

    <!-- Puntos de circuito R -->
    <circle cx="510" cy="380" r="7" fill="#22d3ee"/>
    <circle cx="720" cy="480" r="7" fill="#22d3ee"/>
    <circle cx="510" cy="580" r="7" fill="#22d3ee"/>
    <circle cx="545" cy="395" r="3" fill="#22d3ee"/>
    <circle cx="545" cy="430" r="3" fill="#22d3ee"/>
    <circle cx="545" cy="465" r="3" fill="#22d3ee"/>
  </g>

  <!-- Micro-detalles de automatización (Puntos de datos) -->
  <g opacity="0.9">
    <circle cx="205" cy="350" r="2.5" fill="#22d3ee"/>
    <circle cx="285" cy="405" r="2.5" fill="#22d3ee"/>
    <circle cx="590" cy="280" r="2.5" fill="#22d3ee"/>
    <circle cx="660" cy="410" r="2.5" fill="#22d3ee"/>
    <circle cx="455" cy="510" r="2.5" fill="#22d3ee"/>
    <circle cx="680" cy="560" r="2.5" fill="#22d3ee"/>
    <circle cx="380" cy="280" r="2" fill="#22d3ee"/>
    <circle cx="620" cy="340" r="2" fill="#22d3ee"/>
  </g>

  <!-- Brillo superior sutil -->
  <g opacity="0.1">
    <path d="M155 615 V185 L330 450 L505 185 V615"
      stroke="white"
      stroke-width="8"
      fill="none"
      stroke-linecap="round"/>
  </g>
</svg>