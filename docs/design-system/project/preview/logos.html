<!doctype html><html><head><meta charset="utf-8"><title>Logos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;-webkit-font-smoothing:antialiased}
body{padding:16px;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;align-items:stretch}
.box{background:#f8fafc;border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:center;min-height:110px;border:1px solid #f1f5f9}
.dark{background:#0d1a2d}
img{max-width:100%;max-height:80px;object-fit:contain}
</style></head>
<body>
<div class="box"><img src="../assets/logo-mrtooliaa.png" alt="MR ToolIAA"></div>
<div class="box dark"><img src="../assets/logo-mrtooliaa-white.png" alt="MR ToolIAA white"></div>
<div class="box"><img src="../assets/logo-mediturno-icon.png" alt="MediTurno"></div>
<div class="box"><img src="../assets/logo-ferretquote-icon.png" alt="Ferret-Quote"></div>
</body></html>
