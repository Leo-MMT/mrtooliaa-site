<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#0d1a2d;-webkit-font-smoothing:antialiased}
body{padding:20px}
.r{display:flex;align-items:center;gap:14px;padding:5px 0}
.n{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11px;color:#6b7280;width:70px}
.bar{background:#f97316;height:14px;border-radius:3px}
.lbl{font-size:11px;color:#9ca3af;margin-left:6px}
</style></head>
<body>
<div class="r"><span class="n">1 · 4px</span><div class="bar" style="width:4px"></div><span class="lbl">icon/text gap</span></div>
<div class="r"><span class="n">2 · 8px</span><div class="bar" style="width:8px"></div><span class="lbl">inline gap</span></div>
<div class="r"><span class="n">3 · 12px</span><div class="bar" style="width:12px"></div><span class="lbl">chip padding</span></div>
<div class="r"><span class="n">4 · 16px</span><div class="bar" style="width:16px"></div><span class="lbl">card gap</span></div>
<div class="r"><span class="n">6 · 24px</span><div class="bar" style="width:24px"></div><span class="lbl">card padding Y</span></div>
<div class="r"><span class="n">8 · 32px</span><div class="bar" style="width:32px"></div><span class="lbl">card padding · grid gap</span></div>
<div class="r"><span class="n">12 · 48px</span><div class="bar" style="width:48px"></div><span class="lbl">section header margin</span></div>
<div class="r"><span class="n">20 · 80px</span><div class="bar" style="width:80px"></div><span class="lbl">section py-20 ★</span></div>
</body></html>
