<!doctype html><html><head><meta charset="utf-8"><title>Gradients</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;-webkit-font-smoothing:antialiased}
body{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g{height:100px;border-radius:14px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.n{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.c{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:10px;font-weight:500;opacity:.85}
</style></head>
<body>
<div class="g" style="background:linear-gradient(135deg,#0d1a2d 0%,#1e3a5f 55%,#2a5298 100%)"><span class="n">gradient-hero</span><span class="c">#0d1a2d → #1e3a5f → #2a5298</span></div>
<div class="g" style="background:linear-gradient(135deg,#f97316 0%,#ea580c 100%)"><span class="n">gradient-cta</span><span class="c">#f97316 → #ea580c</span></div>
<div class="g" style="background:linear-gradient(135deg,#003d7a 0%,#0066CC 50%,#0088ff 100%)"><span class="n">gradient-medical</span><span class="c">#003d7a → #0066CC → #0088ff</span></div>
<div class="g" style="background:linear-gradient(135deg,#00aa55 0%,#00CC66 100%)"><span class="n">gradient-wa</span><span class="c">#00aa55 → #00CC66</span></div>
<div class="g" style="background:linear-gradient(180deg,#f8fafc 0%,#f1f5f9 100%);color:#1e3a5f"><span class="n">gradient-section</span><span class="c">#f8fafc → #f1f5f9</span></div>
<div class="g" style="background:#1f2937;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.08) 0,rgba(255,255,255,.08) 2px,transparent 2px,transparent 12px)"><span class="n">hero-texture</span><span class="c">diagonal 2px @ 1.5% opacity</span></div>
</body></html>
