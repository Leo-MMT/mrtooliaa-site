<!doctype html><html><head><meta charset="utf-8"><title>Brand colors</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#1f2937;-webkit-font-smoothing:antialiased}
body{padding:20px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:104px;height:104px;border-radius:14px;padding:10px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.hex{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11px;font-weight:600}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#0d1a2d;color:#fff"><span class="name">Navy 800</span><span class="hex">#0d1a2d</span></div>
  <div class="sw" style="background:#12233c;color:#fff"><span class="name">Navy 700</span><span class="hex">#12233c</span></div>
  <div class="sw" style="background:#182f4e;color:#fff"><span class="name">Navy 600</span><span class="hex">#182f4e</span></div>
  <div class="sw" style="background:#1e3a5f;color:#fff"><span class="name">Navy 500</span><span class="hex">#1e3a5f</span></div>
  <div class="sw" style="background:#c5d5e8;color:#0d1a2d"><span class="name">Navy 100</span><span class="hex">#c5d5e8</span></div>
  <div class="sw" style="background:#e8eef5;color:#0d1a2d"><span class="name">Navy 50</span><span class="hex">#e8eef5</span></div>
  <div class="sw" style="background:#fb923c;color:#0d1a2d"><span class="name">Brand 400</span><span class="hex">#fb923c</span></div>
  <div class="sw" style="background:#f97316;color:#fff"><span class="name">Brand 500</span><span class="hex">#f97316</span></div>
  <div class="sw" style="background:#ea6a08;color:#fff"><span class="name">Brand 600</span><span class="hex">#ea6a08</span></div>
</div>
</body></html>
