<!doctype html><html><head><meta charset="utf-8"><title>Type weights</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#0d1a2d;-webkit-font-smoothing:antialiased}
body{padding:20px}
.r{display:flex;align-items:baseline;gap:16px;padding:6px 0;border-bottom:1px solid #f3f4f6}
.r:last-child{border:0}
.w{font-size:24px;flex:1}
.t{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11px;color:#9ca3af;width:140px}
</style></head>
<body>
<div class="r"><div class="t">Regular · 400</div><div class="w" style="font-weight:400">Automatizamos procesos</div></div>
<div class="r"><div class="t">Medium · 500</div><div class="w" style="font-weight:500">Automatizamos procesos</div></div>
<div class="r"><div class="t">SemiBold · 600</div><div class="w" style="font-weight:600">Automatizamos procesos</div></div>
<div class="r"><div class="t">Bold · 700</div><div class="w" style="font-weight:700">Automatizamos procesos</div></div>
<div class="r"><div class="t">ExtraBold · 800</div><div class="w" style="font-weight:800">Automatizamos procesos</div></div>
<div class="r"><div class="t">Black · 900</div><div class="w" style="font-weight:900">Automatizamos procesos</div></div>
</body></html>
