<!doctype html><html><head><meta charset="utf-8"><title>Type display</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#0d1a2d;-webkit-font-smoothing:antialiased}
body{padding:20px}
.hero{font-size:54px;font-weight:900;line-height:1.05;letter-spacing:-0.02em}
.hero .a{color:#f97316}
.h1{font-size:40px;font-weight:900;line-height:1.15;margin-top:14px;letter-spacing:-0.015em}
.meta{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:10px;color:#9ca3af;margin-top:4px;letter-spacing:.04em}
</style></head>
<body>
<div class="hero">Tu agente IA<br><span class="a">trabaja 24/7</span></div>
<div class="meta">Inter 900 · 54px / 1.05 · -0.02em — hero display</div>
<div class="h1">Precios transparentes, sin sorpresas</div>
<div class="meta">Inter 900 · 40px / 1.15 — h1 / section</div>
</body></html>
