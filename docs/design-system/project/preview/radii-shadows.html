<!doctype html><html><head><meta charset="utf-8"><title>Radii & Shadows</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#f8fafc;color:#0d1a2d;-webkit-font-smoothing:antialiased}
body{padding:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.c{background:#fff;padding:14px;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.k{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#0d1a2d}
.v{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:10px;color:#6b7280}
.box{width:100%;height:52px;background:#fff;border:1px solid #f3f4f6}
</style></head>
<body>
<div class="grid">
  <div class="c" style="border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05)"><div class="k">rounded-sm</div><div class="v">0.5rem · chips</div></div>
  <div class="c" style="border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.07)"><div class="k">rounded-md</div><div class="v">0.75rem · btns</div></div>
  <div class="c" style="border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.10)"><div class="k">rounded-2xl</div><div class="v">1rem · cards ★</div></div>
  <div class="c" style="border-radius:24px;box-shadow:0 8px 32px rgba(0,0,0,.18)"><div class="k">rounded-3xl</div><div class="v">1.5rem · mockups</div></div>
  <div class="c" style="border-radius:9999px;box-shadow:0 4px 6px rgba(0,0,0,.07);align-items:center"><div class="k">rounded-full</div><div class="v">buttons · pills</div></div>
  <div class="c" style="border-radius:16px;box-shadow:0 20px 40px rgba(0,0,0,.12)"><div class="k">shadow-hover</div><div class="v">card lift</div></div>
  <div class="c" style="border-radius:16px;box-shadow:0 10px 30px rgba(249,115,22,.30);border:1px solid #fed7aa"><div class="k">shadow-orange</div><div class="v">CTA glow</div></div>
  <div class="c" style="border-radius:16px;box-shadow:0 6px 24px rgba(37,211,102,.45);border:1px solid #bbf7d0"><div class="k">shadow-wa</div><div class="v">WhatsApp CTA</div></div>
</div>
</body></html>
