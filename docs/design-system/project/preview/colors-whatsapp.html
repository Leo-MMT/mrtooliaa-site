<!doctype html><html><head><meta charset="utf-8"><title>WhatsApp colors</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#1f2937;-webkit-font-smoothing:antialiased}
body{padding:20px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:104px;height:96px;border-radius:14px;padding:10px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.hex{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:11px;font-weight:600}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#25d366;color:#fff"><span class="name">WA green</span><span class="hex">#25d366</span></div>
  <div class="sw" style="background:#00CC66;color:#fff"><span class="name">CTA</span><span class="hex">#00CC66</span></div>
  <div class="sw" style="background:#16a34a;color:#fff"><span class="name">Success</span><span class="hex">#16a34a</span></div>
  <div class="sw" style="background:#075E54;color:#fff"><span class="name">WA hdr</span><span class="hex">#075E54</span></div>
  <div class="sw" style="background:#DCF8C6;color:#0d1a2d"><span class="name">Bubble out</span><span class="hex">#DCF8C6</span></div>
  <div class="sw" style="background:#ECE5DD;color:#0d1a2d"><span class="name">Bubble bg</span><span class="hex">#ECE5DD</span></div>
</div>
</body></html>
